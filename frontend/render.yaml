services:
  # Frontend static site (if deploying separately)
  - type: web
    name: media-codex-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_ORIGIN
        value: https://codex-research-radar.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend web service (your existing FastAPI app)
