<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Codex Research Radar</title>
    <meta name="description" content="Research aggregation and media analysis platform">
    <link rel="manifest" href="/static/dist/manifest.json">
    <meta name="theme-color" content="#081018">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/dist/icons/icon.svg">
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <!-- Inline critical styles to prevent FOUC -->
    <style>
      body { margin: 0; background: #081018; color: #eef4fb; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker for offline support and asset caching
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Research Radar</title>
    <link rel="manifest" href="/static/dist/manifest.json">
    <meta name="theme-color" content="#0a0e17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/dist/icons/icon.svg">
    <!-- CSS injected by Vite build -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Clean up stale service workers and caches
      ;(async () => {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations()
            await Promise.allSettled(regs.map((reg) => reg.unregister()))
          }
          if ('caches' in window) {
            const keys = await caches.keys()
            await Promise.allSettled(keys.map((key) => caches.delete(key)))
          }
        } catch {}
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
