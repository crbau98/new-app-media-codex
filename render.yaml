services:
  - type: web
    name: codex-research-radar
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: codex-research-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_PATH
        value: /tmp/research.db
      - key: IMAGE_DIR
        value: /tmp/images
      - key: SQLITE_TIMEOUT_SECONDS
        value: 10
      - key: SQLITE_BUSY_TIMEOUT_MS
        value: 10000
      - key: RUN_STARTUP_CRAWL
        value: false
