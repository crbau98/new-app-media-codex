services:
  - type: web
    name: codex-research-radar
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: codex-research-data
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_PATH
        value: /app/data/research.db
      - key: IMAGE_DIR
        value: /app/data/images
      - key: SQLITE_TIMEOUT_SECONDS
        value: 10
      - key: SQLITE_BUSY_TIMEOUT_MS
        value: 10000
      - key: RUN_STARTUP_CRAWL
        value: false
      - key: SKIP_MEDIA_DOWNLOADS
        value: "true"
      # Comma-separated origins for the Vercel UI (required for browser API/WebSocket/SSE from another host).
      # Defaults to * (allow all) so split Vercel+Render deployments work immediately.
      # Restrict to your specific Vercel domain in production if desired.
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      # Outbound proxy for coomer/kemono fetches (blocked from datacenter IPs).
      # Set in Render dashboard: http://user:pass@host:port
      # (Webshare/IPRoyal/Smartproxy/etc.) See /api/screenshots/proxy-status to verify.
      - key: ARCHIVER_PROXY_URL
        sync: false
      - key: ARCHIVER_PROXY_DISABLE_IMG
        value: "1"

  # Keep-alive cron — pings /healthz every 14 minutes so Render never spins
  # the starter-plan service down. Cold starts caused 30-90s first-load delays.
  # Update APP_URL if the service hostname changes.
  - type: cron
    name: keep-alive-ping
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    schedule: "*/14 * * * *"
    startCommand: "curl -fsS https://codex-research-radar.onrender.com/healthz"
